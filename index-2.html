<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Forêt Enchantée — Bibliothèque audio jeunesse</title>
  <meta name="description" content="Découvre des histoires, contes et comptines dans la Forêt Enchantée.">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Style principal -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Favicon emoji -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌲</text></svg>">
</head>
<body>

  <!-- ── En-tête ───────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="site-logo" onclick="renderHome()" title="Accueil">
        <span>🌲</span> La Forêt Enchantée
      </div>
      <div class="search-wrap">
        <input
          type="search"
          id="search-input"
          placeholder="Chercher une histoire…"
          autocomplete="off"
          aria-label="Rechercher une histoire"
        >
      </div>
      <a href="login.html" class="header-admin-link" title="Espace administrateur">⚙ Admin</a>
    </div>
  </header>

  <!-- ── Zone hero (visible uniquement sur l'accueil) ──────── -->
  <section class="hero" id="hero-section">
    <h1 class="hero-title">
      <span class="hero-emoji">🌿</span> La Forêt Enchantée
    </h1>
  </section>

  <!-- ── Contenu principal ─────────────────────────────────── -->
  <main class="main-wrap">
    <div id="main-content">
      <!-- Rendu dynamique par app.js -->
    </div>
  </main>

  <!-- ── Pied de page ──────────────────────────────────────── -->
  <footer class="site-footer">
    <p>🌲 La Forêt Enchantée — Histoires et contes pour les enfants</p>
    <p style="margin-top:0.75rem"><a href="login.html" style="font-size:0.75rem;opacity:0.25;color:inherit;text-decoration:none">⚙ Admin</a></p>
  </footer>

  <!-- ── Scripts ───────────────────────────────────────────── -->
  <!-- Supabase SDK (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Cache le hero quand on quitte l'accueil
    const _origRenderHome = renderHome;
    renderHome = function() {
      document.getElementById('hero-section').style.display = '';
      _origRenderHome();
    };

    const _origOpenCat = openCategory;
    openCategory = function(cat) {
      document.getElementById('hero-section').style.display = 'none';
      _origOpenCat(cat);
    };

    const _origRenderSearch = renderSearch;
    renderSearch = function(q) {
      document.getElementById('hero-section').style.display = 'none';
      _origRenderSearch(q);
    };
  </script>
</body>
</html>
