<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — La Forêt Enchantée</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌲</text></svg>">
  <style>
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 48px; }
    .btn-eye {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--pale-mist); font-size: 1.1rem;
      cursor: pointer; padding: 0; line-height: 1;
      opacity: 0.6; transition: opacity 0.2s;
    }
    .btn-eye:hover { opacity: 1; }
    .login-success {
      background: #2d6a4a; color: #d4f0e0;
      border: 1px solid #4a9a6a;
      border-radius: 10px; padding: 12px;
      margin-top: 1rem; font-size: 0.9rem;
      text-align: center; display: none;
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-card">

      <div class="login-logo">🌲 La Forêt Enchantée</div>
      <div class="login-sub">Espace administrateur</div>

      <form id="login-form" novalidate>

        <div class="form-group">
          <label for="email">Adresse e-mail</label>
          <input type="email" id="email" placeholder="admin@exemple.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="btn-eye" id="btn-eye" title="Afficher/masquer">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="btn-login">Se connecter</button>

        <p class="form-error" id="login-error" style="display:none"></p>
        <div class="login-success" id="login-success">✅ Connexion réussie ! Redirection…</div>

      </form>

      <p style="margin-top:1.5rem">
        <a href="index.html" style="font-size:0.85rem;opacity:0.55">← Retour au site</a>
      </p>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Si déjà connecté, rediriger directement
    getSession().then(session => {
      if (session) window.location.href = 'admin.html';
    });

    // Bouton afficher/masquer mot de passe
    document.getElementById('btn-eye').addEventListener('click', () => {
      const input = document.getElementById('password');
      const btn   = document.getElementById('btn-eye');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    });

    // Soumission du formulaire
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();

      const btn     = document.getElementById('btn-login');
      const errEl   = document.getElementById('login-error');
      const succEl  = document.getElementById('login-success');
      const email   = document.getElementById('email').value.trim();
      const pass    = document.getElementById('password').value;

      btn.disabled    = true;
      btn.textContent = 'Connexion…';
      errEl.style.display  = 'none';
      succEl.style.display = 'none';

      const { error } = await signIn(email, pass);

      if (error) {
        errEl.textContent   = '❌ Identifiants incorrects. Vérifiez votre e-mail et mot de passe.';
        errEl.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Se connecter';
        return;
      }

      succEl.style.display = 'block';
      setTimeout(() => { window.location.href = 'admin.html'; }, 1200);
    });
  </script>

</body>
</html>
