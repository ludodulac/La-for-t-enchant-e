<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — La Forêt Enchantée</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 48px; width: 100%; }
    .btn-eye {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      font-size: 1.1rem; cursor: pointer;
      opacity: 0.6; padding: 0;
    }
    .btn-eye:hover { opacity: 1; }
    .msg-success {
      background: #2d6a4a; color: #d4f0e0;
      border: 1px solid #4a9a6a;
      border-radius: 10px; padding: 12px;
      margin-top: 1rem; text-align: center;
      font-size: 0.95rem; display: none;
    }
    .msg-error {
      background: #6a2d2d; color: #f0d4d4;
      border: 1px solid #9a4a4a;
      border-radius: 10px; padding: 12px;
      margin-top: 1rem; text-align: center;
      font-size: 0.95rem; display: none;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">🌲 La Forêt Enchantée</div>
      <div class="login-sub">Espace administrateur</div>

      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" placeholder="admin@exemple.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="btn-eye" id="btn-eye">👁</button>
        </div>
      </div>

      <button class="btn-primary" id="btn-login">Se connecter</button>

      <div class="msg-success" id="msg-success">✅ Connexion réussie ! Redirection en cours…</div>
      <div class="msg-error" id="msg-error"></div>

      <p style="margin-top:1.5rem">
        <a href="index.html" style="font-size:0.85rem;opacity:0.55">← Retour au site</a>
      </p>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Rediriger si déjà connecté
    getSession().then(session => {
      if (session) window.location.href = 'admin.html';
    });

    // Afficher/masquer mot de passe
    document.getElementById('btn-eye').addEventListener('click', () => {
      const input = document.getElementById('password');
      if (input.type === 'password') {
        input.type = 'text';
        document.getElementById('btn-eye').textContent = '🙈';
      } else {
        input.type = 'password';
        document.getElementById('btn-eye').textContent = '👁';
      }
    });

    // Connexion
    document.getElementById('btn-login').addEventListener('click', async () => {
      const btn    = document.getElementById('btn-login');
      const email  = document.getElementById('email').value.trim();
      const pass   = document.getElementById('password').value;
      const succ   = document.getElementById('msg-success');
      const err    = document.getElementById('msg-error');

      succ.style.display = 'none';
      err.style.display  = 'none';

      if (!email || !pass) {
        err.textContent   = '❌ Merci de remplir l\'e-mail et le mot de passe.';
        err.style.display = 'block';
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Connexion en cours…';

      const { error } = await signIn(email, pass);

      if (error) {
        err.textContent   = '❌ Identifiants incorrects. Vérifiez votre e-mail et mot de passe.';
        err.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Se connecter';
        return;
      }

      succ.style.display = 'block';
      setTimeout(() => { window.location.href = 'admin.html'; }, 1500);
    });
  </script>
</body>
</html>
