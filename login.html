<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — La Forêt Enchantée</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 48px; width: 100%; }
    .btn-eye {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      font-size: 1.1rem; cursor: pointer;
      opacity: 0.6; padding: 0;
    }
    .msg-success {
      background: #2d6a4a; color: #d4f0e0;
      border: 1px solid #4a9a6a;
      border-radius: 10px; padding: 12px;
      margin-top: 1rem; text-align: center;
      font-size: 0.95rem; display: none;
    }
    .msg-error {
      background: #6a2d2d; color: #f0d4d4;
      border: 1px solid #9a4a4a;
      border-radius: 10px; padding: 12px;
      margin-top: 1rem; text-align: center;
      font-size: 0.95rem; display: none;
    }
    .msg-debug {
      background: #1a1a2e; color: #a0c0ff;
      border: 1px solid #3050a0;
      border-radius: 10px; padding: 12px;
      margin-top: 1rem; font-size: 0.8rem;
      font-family: monospace; display: none;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">🌲 La Forêt Enchantée</div>
      <div class="login-sub">Espace administrateur</div>

      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" placeholder="admin@exemple.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="btn-eye" id="btn-eye">👁</button>
        </div>
      </div>

      <button class="btn-primary" id="btn-login">Se connecter</button>

      <div class="msg-success" id="msg-success">✅ Connexion réussie ! Redirection en cours…</div>
      <div class="msg-error" id="msg-error"></div>
      <div class="msg-debug" id="msg-debug"></div>

      <p style="margin-top:1.5rem">
        <a href="index.html" style="font-size:0.85rem;opacity:0.55">← Retour au site</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function debug(msg) {
      const el = document.getElementById('msg-debug');
      el.style.display = 'block';
      el.textContent = msg;
    }

    // Vérifier que Supabase est bien chargé
    if (typeof window.supabase === 'undefined') {
      debug('❌ ERREUR : SDK Supabase non chargé');
    } else {
      debug('✅ SDK chargé — prêt');
    }

    // Rediriger si déjà connecté
    getSession().then(session => {
      if (session) window.location.href = 'admin.html';
    });

    document.getElementById('btn-eye').addEventListener('click', () => {
      const input = document.getElementById('password');
      if (input.type === 'password') {
        input.type = 'text';
        document.getElementById('btn-eye').textContent = '🙈';
      } else {
        input.type = 'password';
        document.getElementById('btn-eye').textContent = '👁';
      }
    });

    document.getElementById('btn-login').addEventListener('click', async () => {
      const btn   = document.getElementById('btn-login');
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      const succ  = document.getElementById('msg-success');
      const err   = document.getElementById('msg-error');

      succ.style.display = 'none';
      err.style.display  = 'none';

      if (!email || !pass) {
        err.textContent   = '❌ Merci de remplir l\'e-mail et le mot de passe.';
        err.style.display = 'block';
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Connexion en cours…';
      debug('⏳ Tentative de connexion pour : ' + email);

      try {
        const { data, error } = await signIn(email, pass);

        if (error) {
          debug('❌ Erreur Supabase : ' + error.message + ' (code: ' + error.status + ')');
          err.textContent   = '❌ ' + error.message;
          err.style.display = 'block';
          btn.disabled    = false;
          btn.textContent = 'Se connecter';
          return;
        }

        debug('✅ Connecté ! User : ' + data.user.email);
        succ.style.display = 'block';
        setTimeout(() => { window.location.href = 'admin.html'; }, 1500);

      } catch(e) {
        debug('❌ Exception : ' + e.message);
        btn.disabled    = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
